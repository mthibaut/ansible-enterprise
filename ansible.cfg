[defaults]
# Opt into future Ansible behaviour: facts set via set_fact are no longer
# injected as top-level variables. Access them via ansible_facts dict instead.
# Suppresses: "INJECT_FACTS_AS_VARS default to True is deprecated"
inject_facts_as_vars = False

# Inventory and playbook roots relative to build/ where the runtime lives.
inventory = build/inventory/hosts.ini

interpreter_python = auto_silent

# Run all hosts in parallel (default forks=5 serialises 17-host runs).
forks = 20

# Let each host proceed independently instead of waiting per task.
strategy = free
