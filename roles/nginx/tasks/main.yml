---
- name: Install nginx
  package:
    name: nginx
    state: present
- name: Ensure nginx conf.d exists
  file:
    path: /etc/nginx/conf.d
    state: directory
    mode: "0755"
- name: Deploy global nginx config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    mode: "0644"
    validate: "nginx -t -c %s"
  notify: Reload nginx
- name: Render service vhosts
  include_tasks: render_service.yml
  loop: "{{ services | dict2items | sort(attribute='key') }}"
  loop_control:
    loop_var: service
