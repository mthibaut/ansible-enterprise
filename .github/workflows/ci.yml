name: CI
on:
  push:
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install validation dependencies
        run: pip install PyYAML jsonschema
      - name: Generate build/ from src/
        run: make generate
      - name: Verify repository contracts
        run: make validate
      - name: Validate checkpoint ordering
        run: make checkpoints
